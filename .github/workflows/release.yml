name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Publish release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Get version from manifest
        id: version
        run: |
          echo "version=$(jq -r '.version' custom_components/stagg_ekg_plus/manifest.json)" >> "$GITHUB_OUTPUT"

      - name: Verify version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          MANIFEST_VERSION="${{ steps.version.outputs.version }}"
          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "Version mismatch: tag=$TAG_VERSION, manifest=$MANIFEST_VERSION"
            exit 1
          fi

      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Print the "## <version>" section, trimming surrounding blank lines.
          awk -v ver="$VERSION" '
            $0 ~ "^## "ver"([ ].*)?$" {flag=1; next}
            /^## / && flag {exit}
            flag {
              if (!started && $0 ~ /^[[:space:]]*$/) next
              started=1; buf[n++]=$0
            }
            END {
              while (n > 0 && buf[n-1] ~ /^[[:space:]]*$/) n--
              for (i = 0; i < n; i++) print buf[i]
            }
          ' CHANGELOG.md > section.md
          if [ ! -s section.md ]; then
            echo "No CHANGELOG.md section found for version $VERSION"
            exit 1
          fi
          # Re-add the "What's new in" heading prior releases use.
          { printf "## What's new in %s\n\n" "$VERSION"; cat section.md; } > release_notes.md
          echo "Release notes for $VERSION:"
          cat release_notes.md

      - name: Create zip for release
        run: zip -r stagg_ekg_plus.zip custom_components/stagg_ekg_plus

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release_notes.md
          files: stagg_ekg_plus.zip
